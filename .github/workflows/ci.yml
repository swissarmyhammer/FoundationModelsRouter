name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: swissarmyhammer/workflows/.github/workflows/swift-ci.yaml@main
    with:
      integration-gate-env: FM_ROUTER_INTEGRATION_TESTS
      integration-xctest-glob: "*IntegrationTests.xctest"
      integration-metallib-glob: "*Cmlx*/default.metallib"
